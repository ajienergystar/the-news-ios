disabled_rules:
  - trailing_whitespace

opt_in_rules:
  - empty_count
  - empty_string
  - force_unwrapping
  - implicitly_unwrapped_optional
  - overridden_super_call
  - redundant_nil_coalescing
  - trailing_closure

excluded:
  - Carthage
  - Pods
  - DerivedData
  - .build
  - TheNews.xcodeproj

line_length:
  warning: 120
  error: 200
  ignores_urls: true
  ignores_function_declarations: true

type_body_length:
  warning: 300
  error: 400

file_length:
  warning: 500
  error: 1000

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - url

reporter: xcode
